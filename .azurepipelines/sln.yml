#
# Build all solutions on windows
#
jobs:
- job: buildallsln
  displayName: Build Solutions 
  pool:
    vmImage: 'windows-2022'
  steps:
  - task: NuGetAuthenticate@1
  - task: UseDotNet@2
    displayName: 'Install .NET 10.0'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'
  - task: MSBuild@1
    displayName: Restore Release
    inputs:
      solution: '**/*.sln'
      configuration: 'Release'
      platform: 'Any CPU'
      # Use MSBuild restore instead of nuget.exe restore so that OS-conditional
      # MSBuild properties (e.g. $([MSBuild]::IsOsPlatform('Windows')) in targets.props)
      # are correctly evaluated when determining TargetFrameworks for SDK-style projects.
      # /p:RestoreForceEvaluate=true ensures fresh evaluation even with cached results.
      msbuildArguments: /t:Restore /p:RestoreForceEvaluate=true
  - task: MSBuild@1
    displayName: MS Build Release
    inputs:
      solution: '**/*.sln' 
      configuration: 'Release'
      platform: 'Any CPU'
      msbuildArguments: 
  - task: MSBuild@1
    displayName: Restore Debug
    inputs:
      solution: '**/*.sln'
      configuration: 'Debug'
      platform: 'Any CPU'
      # Same as Restore Release: use MSBuild restore for correct property evaluation.
      msbuildArguments: /t:Restore /p:RestoreForceEvaluate=true
  - task: MSBuild@1
    displayName: MS Build Debug
    inputs:
      solution: '**/*.sln'
      configuration: 'Debug'
      platform: 'Any CPU'
      msbuildArguments: 
